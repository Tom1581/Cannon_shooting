<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432">
  <!-- Adaptive icon foreground: the inner 264x264 area is the safe zone. -->
  <!-- We center a zombie silhouette over crosshairs. -->
  <g transform="translate(216,216)">
    <!-- Crosshair ring (thin, behind zombie) -->
    <circle r="120" fill="none" stroke="#1a2418" stroke-width="6" opacity="0.55"/>
    <circle r="120" fill="none" stroke="#9bbf3a" stroke-width="3" opacity="0.85"/>
    <line x1="-150" y1="0" x2="-120" y2="0" stroke="#9bbf3a" stroke-width="6"/>
    <line x1="120" y1="0" x2="150" y2="0" stroke="#9bbf3a" stroke-width="6"/>
    <line x1="0" y1="-150" x2="0" y2="-120" stroke="#9bbf3a" stroke-width="6"/>
    <line x1="0" y1="120" x2="0" y2="150" stroke="#9bbf3a" stroke-width="6"/>

    <!-- Zombie head -->
    <ellipse cx="0" cy="-22" rx="58" ry="62" fill="#7c8f5a"/>
    <!-- Head shadow on right -->
    <ellipse cx="14" cy="-18" rx="44" ry="56" fill="#5a6b40" opacity="0.45"/>
    <!-- Highlight on left -->
    <ellipse cx="-22" cy="-44" rx="22" ry="14" fill="#b0c189" opacity="0.6"/>

    <!-- Eye sockets -->
    <ellipse cx="-20" cy="-22" rx="9" ry="12" fill="#0e1408"/>
    <ellipse cx="18" cy="-22" rx="9" ry="12" fill="#0e1408"/>
    <!-- Inner glints -->
    <circle cx="-22" cy="-26" r="2.5" fill="#9bbf3a"/>
    <circle cx="16" cy="-26" r="2.5" fill="#9bbf3a"/>

    <!-- Stitched mouth -->
    <path d="M-30,18 Q-12,32 0,22 Q14,28 30,16" stroke="#0e1408" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Stitches -->
    <line x1="-22" y1="20" x2="-22" y2="32" stroke="#0e1408" stroke-width="2"/>
    <line x1="-8" y1="24" x2="-8" y2="34" stroke="#0e1408" stroke-width="2"/>
    <line x1="6" y1="24" x2="6" y2="34" stroke="#0e1408" stroke-width="2"/>
    <line x1="20" y1="22" x2="20" y2="32" stroke="#0e1408" stroke-width="2"/>

    <!-- Chin shadow / drip -->
    <path d="M-4,38 Q0,55 4,38 Q2,46 0,52 Q-2,46 -4,38Z" fill="#9bbf3a" opacity="0.85"/>

    <!-- Shoulders / collar hint -->
    <path d="M-86,52 Q-40,42 0,46 Q40,42 86,52 L92,86 L-92,86 Z" fill="#3a4a1d"/>
    <path d="M-86,52 Q-40,42 0,46 Q40,42 86,52 L88,62 L-88,62 Z" fill="#5e4a36"/>
  </g>
</svg>
